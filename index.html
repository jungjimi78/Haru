<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>오늘</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#f7efe7">
<style>
:root{
 --paper:#fffdf8;--ink:#241d18;--muted:#8b7a6e;--line:#eadfd4;--dark:#2a211b;
 --reflection:#ead8ff;--english:#d5ecff;--reading:#dff0c8;--meal:#ffe9b7;--gratitude:#ffe0c7;
 --family:#ffd8df;--swim:#cdefff;--health:#d8f0df;--work:#dce5ff;--move:#e6e2dd;--rest:#eee7df;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:linear-gradient(180deg,#f4e8dc,#fbf6ef);color:var(--ink)}
.app{max-width:520px;margin:0 auto;padding:10px 10px 78px}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:5px 2px 8px}
.brand{display:flex;align-items:center;gap:10px}
.icon{width:44px;height:44px;border-radius:12px;box-shadow:0 6px 16px rgba(90,55,30,.15);object-fit:cover}
h1{margin:0;font-size:28px;letter-spacing:-.06em}
button{font:inherit}
.btn{border:0;border-radius:14px;background:var(--dark);color:white;font-weight:800;padding:10px 12px}
.btn.light{background:white;color:var(--ink);border:1px solid var(--line)}
.btn.danger{background:#de5252}
.dateNav{display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:center;margin:2px 0 8px}
.dateNav button{height:38px;border-radius:14px}
.dateBtn{height:38px;border:1px solid var(--line);background:white;border-radius:14px;color:var(--ink);font-weight:850}
.archive{background:var(--paper);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 14px 35px rgba(70,45,25,.08)}
.hourRow{display:grid;grid-template-columns:48px 1fr;min-height:34px;border-bottom:1px solid #efe6dc}
.hour{padding-top:5px;text-align:center;color:#6d5b4f;font-size:12px;background:#fff8f0;border-right:1px solid var(--line)}
.hourBody{position:relative;padding:3px 5px;min-height:34px;background:white}
.hourBody.empty::after{content:"＋";position:absolute;left:9px;top:5px;color:#c2b3a7;font-size:14px}
.block{width:100%;display:block;border:1px solid rgba(70,45,25,.08);border-left:5px solid rgba(60,40,20,.23);border-radius:12px;padding:4px 7px;margin-bottom:3px;text-align:left;color:var(--ink);cursor:pointer;box-shadow:0 3px 8px rgba(65,40,20,.04)}
.blockTitle{font-weight:900;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.blockTime{font-size:10px;color:rgba(36,29,24,.62);margin-top:1px}
.done{opacity:.55}.done .blockTitle{text-decoration:line-through}
.type-reflection{background:var(--reflection)}.type-english{background:var(--english)}.type-reading{background:var(--reading)}.type-meal{background:var(--meal)}.type-gratitude{background:var(--gratitude)}
.type-family{background:var(--family)}.type-swim{background:var(--swim)}.type-health{background:var(--health)}.type-work{background:var(--work)}.type-move{background:var(--move)}.type-rest{background:var(--rest)}
.noteBox{margin-top:8px;background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:12px}
.noteBox h3{margin:0 0 8px;font-size:17px}
textarea,input,select{width:100%;font:inherit;border:1px solid var(--line);border-radius:14px;background:#fffaf5;padding:10px 11px}
textarea{min-height:58px;resize:vertical}
.bottomBar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;pointer-events:none}
.bottomInner{width:100%;max-width:520px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);pointer-events:auto}
.bottomInner button{background:transparent;border:0;padding:10px 2px;color:var(--ink);font-weight:850;font-size:12px}
.modal{position:fixed;inset:0;display:none;background:rgba(0,0,0,.32);align-items:flex-end;justify-content:center;z-index:20}
.modal.show{display:flex}
.sheet{width:100%;max-width:520px;max-height:90vh;overflow:auto;background:white;border-radius:28px 28px 0 0;padding:18px 16px 22px;box-shadow:0 -18px 45px rgba(0,0,0,.22)}
.sheet h2{margin:0 0 10px;font-size:22px;letter-spacing:-.04em}
label{display:block;margin:10px 0 5px;font-size:12px;font-weight:900;color:var(--muted)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.template{margin-top:10px;background:#fffdf8;border:1px dashed var(--line);border-radius:18px;padding:12px}
.templateName{font-weight:950;margin-bottom:5px}
.actions{display:flex;gap:8px;margin-top:14px}.actions button{flex:1}
.contentLine{padding:8px 0;border-bottom:1px solid #f0e7df;line-height:1.45}
.contentLine b{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
.calendarGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.calDay{border:1px solid var(--line);background:#fffaf5;border-radius:12px;padding:9px 2px;text-align:center;font-weight:800;color:var(--ink)}
.calDay.has{background:#fff0d4}
.calDay.sel{outline:2px solid #b57931}
.calHead{text-align:center;font-size:12px;color:var(--muted);font-weight:800}
.weekDay{margin:12px 0 6px;font-weight:950;color:var(--muted);font-size:13px}
.weekCard{border:1px solid var(--line);border-radius:16px;padding:10px 11px;margin-bottom:8px;background:#fffaf5}
.weekCard h3{margin:0 0 6px;font-size:16px}
.weekLine{padding:5px 0;border-top:1px solid #f0e7df;font-size:14px;line-height:1.4}
.weekLine:first-of-type{border-top:0}
.weekLine b{display:block;font-size:11px;color:var(--muted);margin-bottom:2px}
.emptyWeekly{padding:22px 4px;color:var(--muted);text-align:center;line-height:1.45}
</style>
</head>
<body>
<div class="app">
<header class="top">
 <div class="brand">
  <img class="icon" src="icon-192.png" alt="오늘 아이콘">
  <h1>오늘</h1>
 </div>
 <div style="display:flex;gap:7px"><button class="btn light" id="addNowBtn">+ 지금</button><button class="btn light" id="resetBtn">초기화</button></div>
</header>

<div class="dateNav">
 <button class="btn light" id="prevDay">‹</button>
 <button class="dateBtn" id="dateBtn"></button>
 <button class="btn light" id="nextDay">›</button>
</div>

<section class="archive"><div id="timeline"></div></section>
<section class="noteBox"><h3>🌙 오늘 한 줄</h3><textarea id="dayNote" placeholder="오늘 하루를 한 문장으로 남기기"></textarea></section>
</div>

<div class="bottomBar"><div class="bottomInner">
<button onclick="openWeekly('reflection')">✨ 묵상</button>
<button onclick="openWeekly('english')">💬 표현</button>
<button onclick="openWeekly('reading')">📚 독서</button>
<button onclick="openWeekly('meal')">🍲 한끼</button>
<button onclick="openWeekly('gratitude')">💛 감사</button>
</div></div>

<div class="modal" id="dateModal"><div class="sheet">
<h2>날짜 선택</h2>
<div class="row"><button class="btn light" id="prevMonth">← 이전 달</button><button class="btn light" id="nextMonth">다음 달 →</button></div>
<h3 id="monthTitle" style="text-align:center;margin:14px 0 8px"></h3>
<div class="calendarGrid" id="calendarHeads"></div>
<div class="calendarGrid" id="calendarGrid"></div>
<div class="actions"><button class="btn light" onclick="closeDateModal()">닫기</button></div>
</div></div>

<div class="modal" id="weeklyModal"><div class="sheet">
<h2 id="weeklyTitle">일주일 모아보기</h2>
<div id="weeklyBody"></div>
<div class="actions"><button class="btn light" onclick="closeWeekly()">닫기</button></div>
</div></div>

<div class="modal" id="viewModal"><div class="sheet">
 <div id="contentView"></div>
 <div class="actions"><button class="btn" id="editFromView">수정</button><button class="btn light" id="sameFromView">같은 시간 추가</button><button class="btn light" onclick="closeView()">닫기</button></div>
</div></div>

<div class="modal" id="editModal"><div class="sheet">
<h2 id="editTitle">블록 추가</h2>
<div class="row"><div><label>시작</label><input id="startTime" type="time" step="300"></div><div><label>끝</label><input id="endTime" type="time" step="300"></div></div>
<label>종류</label><select id="typeInput">
<option value="reflection">✨ 묵상</option><option value="english">💬 오늘의 표현</option><option value="reading">📚 독서</option><option value="meal">🍲 한끼</option><option value="gratitude">💛 감사</option><option value="family">👨‍👩‍👦 가족</option><option value="swim">🏊 수영</option><option value="health">🧘 건강</option><option value="work">💻 일</option><option value="move">🚗 이동</option><option value="rest">🌿 휴식</option>
</select>
<div class="row"><div><label>아이콘</label><input id="iconInput" maxlength="4"></div><div><label>제목</label><input id="titleInput"></div></div>
<div class="template" id="template"></div>
<label>기본 메모</label><textarea id="memoInput" placeholder="추가로 남길 말"></textarea>
<label><input id="doneInput" type="checkbox" style="width:auto"> 완료</label>
<div class="actions"><button class="btn" id="saveBtn">저장</button><button class="btn danger" id="deleteBtn">삭제</button><button class="btn light" onclick="closeEdit()">닫기</button></div>
</div></div>

<script>
const START=5, END=23;
const meta={
 reflection:{icon:'✨',title:'묵상',cat:'reflection'}, english:{icon:'💬',title:'오늘의 표현',cat:'english'}, reading:{icon:'📚',title:'독서',cat:'reading'}, meal:{icon:'🍲',title:'한끼',cat:'meal'}, gratitude:{icon:'💛',title:'감사',cat:'gratitude'}, family:{icon:'👨‍👩‍👦',title:'가족',cat:'family'}, swim:{icon:'🏊',title:'수영',cat:'swim'}, health:{icon:'🧘',title:'건강',cat:'health'}, work:{icon:'💻',title:'일',cat:'work'}, move:{icon:'🚗',title:'이동',cat:'move'}, rest:{icon:'🌿',title:'휴식',cat:'rest'}
};
const fields={
 reflection:[['verse','오늘 말씀',''],['prayer','기도',''],['after','기도 후 마음','']],
 english:[['s1','문장 1',''],['t1','해석 1',''],['s2','문장 2',''],['t2','해석 2',''],['s3','문장 3',''],['t3','해석 3','']],
 reading:[['book','책 제목',''],['highlight','기억할 문장',''],['thought','내 생각','']],
 meal:[['menu','오늘 메뉴',''],['recipe','레시피',''],['mealMemo','메모','']],
 gratitude:[['g1','감사 1',''],['g2','감사 2',''],['g3','감사 3','']],
 family:[['who','누구와',''],['moment','무슨 일',''],['feeling','내 마음','']],
 swim:[['swimmer','선수',''],['record','기록 / 연습',''],['swimNote','한 줄 메모','']],
 health:[['activity','운동/건강',''],['condition','컨디션',''],['healthNote','메모','']],
 work:[['task','한 일',''],['workNote','메모','']],
 move:[['route','이동',''],['moveNote','메모','']],
 rest:[['restType','휴식',''],['restNote','메모','']]
};
let currentDate=new Date();
let calendarMonth=new Date(currentDate.getFullYear(),currentDate.getMonth(),1);
let blocks=[], editingId=null, viewingId=null;

function ymd(d){return d.toISOString().slice(0,10)}
function storageKey(){return 'today-archive-date-'+ymd(currentDate)}
function noteKey(){return 'today-note-date-'+ymd(currentDate)}
function save(){localStorage.setItem(storageKey(),JSON.stringify(blocks))}
function load(){blocks=JSON.parse(localStorage.getItem(storageKey())||'[]'); dayNote.value=localStorage.getItem(noteKey())||''}
function pad(n){return String(n).padStart(2,'0')}
function minToTime(m){return pad(Math.floor(m/60))+':'+pad(m%60)}
function timeToMin(t){const [h,m]=t.split(':').map(Number);return h*60+m}
function clamp(m){return Math.max(START*60,Math.min(END*60,m))}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}

function render(){load(); renderDate(); renderTimeline();}
function renderDate(){dateBtn.textContent=currentDate.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});}
function renderTimeline(){
 timeline.innerHTML='';
 for(let h=START;h<END;h++){
  const hs=h*60, he=(h+1)*60;
  const arr=blocks.filter(b=>b.start<he && b.end>hs).sort((a,b)=>a.start-b.start);
  const row=document.createElement('div'); row.className='hourRow';
  const hour=document.createElement('div'); hour.className='hour'; hour.textContent=pad(h)+':00';
  const body=document.createElement('div'); body.className='hourBody'+(arr.length?'':' empty');
  body.onclick=()=>openNew(hs,Math.min(hs+30,END*60),'rest');
  arr.forEach(b=>{
   const btn=document.createElement('button'); btn.className='block type-'+meta[b.type].cat+(b.done?' done':'');
   btn.innerHTML='<div class="blockTitle">'+esc((b.icon||meta[b.type].icon)+' '+b.title)+'</div><div class="blockTime">'+minToTime(b.start)+' - '+minToTime(b.end)+'</div>';
   btn.onclick=(e)=>{e.stopPropagation();openView(b.id)};
   body.appendChild(btn);
  });
  row.appendChild(hour); row.appendChild(body); timeline.appendChild(row);
 }
}
function changeDate(days){currentDate.setDate(currentDate.getDate()+days); render()}
prevDay.onclick=()=>changeDate(-1); nextDay.onclick=()=>changeDate(1);

function fillTemplate(type,data={}){
 template.innerHTML='<div class="templateName">'+meta[type].icon+' '+meta[type].title+' 기록</div>';
 (fields[type]||[]).forEach(([key,label,ph])=>{
  const lab=document.createElement('label'); lab.textContent=label; template.appendChild(lab);
  const long=['verse','prayer','after','highlight','thought','mealMemo','moment','feeling','swimNote','healthNote','workNote','moveNote','restNote'].includes(key);
  const el=document.createElement(long?'textarea':'input'); el.id='f_'+key; el.placeholder=ph; el.value=data[key]||''; template.appendChild(el);
 });
}
function collect(type){const out={};(fields[type]||[]).forEach(([key])=>{const el=document.getElementById('f_'+key);out[key]=el?el.value.trim():''});return out}
function applyType(type){iconInput.value=meta[type].icon; titleInput.value=meta[type].title; fillTemplate(type,{})}
typeInput.onchange=e=>applyType(e.target.value);

function openNew(st,en,type){editingId=null; editTitle.textContent='블록 추가'; startTime.value=minToTime(clamp(st)); endTime.value=minToTime(clamp(en)); typeInput.value=type; memoInput.value=''; doneInput.checked=false; deleteBtn.style.display='none'; applyType(type); editModal.classList.add('show')}
function openEdit(id){const b=blocks.find(x=>x.id===id); if(!b)return; editingId=id; closeView(); editTitle.textContent='블록 수정'; startTime.value=minToTime(b.start); endTime.value=minToTime(b.end); typeInput.value=b.type; iconInput.value=b.icon; titleInput.value=b.title; memoInput.value=b.memo||''; doneInput.checked=!!b.done; deleteBtn.style.display='block'; fillTemplate(b.type,b.data||{}); editModal.classList.add('show')}
function closeEdit(){editModal.classList.remove('show');editingId=null;render()}
saveBtn.onclick=()=>{const type=typeInput.value;let st=clamp(timeToMin(startTime.value)),en=clamp(timeToMin(endTime.value));if(en<=st){alert('끝 시간이 시작 시간보다 뒤여야 해.');return}const data={start:st,end:en,type,icon:iconInput.value.trim()||meta[type].icon,title:titleInput.value.trim()||meta[type].title,data:collect(type),memo:memoInput.value.trim(),done:doneInput.checked};if(editingId)blocks=blocks.map(b=>b.id===editingId?{...b,...data}:b);else blocks.push({...data,id:String(Date.now()+Math.random())});save();closeEdit()};
deleteBtn.onclick=()=>{if(editingId){blocks=blocks.filter(b=>b.id!==editingId);save();closeEdit()}};

function openView(id){const b=blocks.find(x=>x.id===id); if(!b)return; viewingId=id; let html='<h2>'+esc((b.icon||meta[b.type].icon)+' '+b.title)+'</h2><div class="contentLine"><b>시간</b>'+minToTime(b.start)+' - '+minToTime(b.end)+'</div>'; (fields[b.type]||[]).forEach(([key,label])=>{const v=(b.data||{})[key]; if(String(v||'').trim()) html+='<div class="contentLine"><b>'+esc(label)+'</b>'+esc(v).replace(/\n/g,'<br>')+'</div>'}); if(b.memo) html+='<div class="contentLine"><b>메모</b>'+esc(b.memo).replace(/\n/g,'<br>')+'</div>'; if(!Object.values(b.data||{}).some(v=>String(v||'').trim())&&!b.memo) html+='<div class="contentLine">아직 내용이 없어.</div>'; contentView.innerHTML=html; viewModal.classList.add('show')}
function closeView(){viewModal.classList.remove('show');viewingId=null}
editFromView.onclick=()=>{if(viewingId)openEdit(viewingId)};
sameFromView.onclick=()=>{const b=blocks.find(x=>x.id===viewingId); if(b){closeView();openNew(b.start,b.end,'rest')}};

function quickAdd(type){let d=new Date(),m=clamp(Math.round((d.getHours()*60+d.getMinutes())/10)*10);openNew(m,Math.min(m+30,END*60),type)}
addNowBtn.onclick=()=>quickAdd('rest');
resetBtn.onclick=()=>{if(confirm('이 날짜의 데이터를 완전히 비울까?')){blocks=[];save();localStorage.removeItem(noteKey());dayNote.value='';render()}};
dayNote.oninput=()=>localStorage.setItem(noteKey(),dayNote.value);

dateBtn.onclick=()=>openDateModal();
function hasData(dateString){return !!localStorage.getItem('today-archive-date-'+dateString)}
function openDateModal(){calendarMonth=new Date(currentDate.getFullYear(),currentDate.getMonth(),1); renderCalendar(); dateModal.classList.add('show')}
function closeDateModal(){dateModal.classList.remove('show')}
prevMonth.onclick=()=>{calendarMonth.setMonth(calendarMonth.getMonth()-1);renderCalendar()};
nextMonth.onclick=()=>{calendarMonth.setMonth(calendarMonth.getMonth()+1);renderCalendar()};
function renderCalendar(){
 monthTitle.textContent=calendarMonth.toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
 calendarHeads.innerHTML=['일','월','화','수','목','금','토'].map(x=>'<div class="calHead">'+x+'</div>').join('');
 calendarGrid.innerHTML='';
 const y=calendarMonth.getFullYear(), m=calendarMonth.getMonth();
 const first=new Date(y,m,1).getDay(); const last=new Date(y,m+1,0).getDate();
 for(let i=0;i<first;i++) calendarGrid.appendChild(document.createElement('div'));
 for(let day=1;day<=last;day++){
  const d=new Date(y,m,day); const ds=ymd(d);
  const btn=document.createElement('button'); btn.className='calDay'+(hasData(ds)?' has':'')+(ds===ymd(currentDate)?' sel':''); btn.textContent=day;
  btn.onclick=()=>{currentDate=d; closeDateModal(); render()};
  calendarGrid.appendChild(btn);
 }
}

function dateAdd(base, days){const d=new Date(base);d.setDate(d.getDate()+days);return d}
function loadBlocksForDate(d){return JSON.parse(localStorage.getItem('today-archive-date-'+ymd(d))||'[]')}
function openWeekly(type){
 weeklyTitle.textContent=meta[type].icon+' '+meta[type].title+' · 최근 7일';
 let html='';
 for(let offset=0; offset>=-6; offset--){
   const d=dateAdd(currentDate, offset);
   const arr=loadBlocksForDate(d).filter(b=>b.type===type);
   if(!arr.length) continue;
   html+='<div class="weekDay">'+d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})+'</div>';
   arr.sort((a,b)=>a.start-b.start).forEach(b=>{
     html+='<div class="weekCard type-'+meta[type].cat+'">';
     html+='<h3>'+esc((b.icon||meta[type].icon)+' '+b.title)+' <span style="font-size:12px;color:rgba(0,0,0,.55);font-weight:700">'+minToTime(b.start)+'-'+minToTime(b.end)+'</span></h3>';
     let has=false;
     (fields[type]||[]).forEach(([key,label])=>{const v=(b.data||{})[key]; if(String(v||'').trim()){has=true; html+='<div class="weekLine"><b>'+esc(label)+'</b>'+esc(v).replace(/\n/g,'<br>')+'</div>';}});
     if(b.memo){has=true; html+='<div class="weekLine"><b>메모</b>'+esc(b.memo).replace(/\n/g,'<br>')+'</div>';}
     if(!has) html+='<div class="weekLine">내용 없음</div>';
     html+='</div>';
   });
 }
 if(!html) html='<div class="emptyWeekly">최근 7일 동안 저장한 '+meta[type].title+' 기록이 없어.<br>시간 줄을 눌러 새 기록을 넣으면 여기에 모여.</div>';
 weeklyBody.innerHTML=html;
 weeklyModal.classList.add('show');
}
function closeWeekly(){weeklyModal.classList.remove('show')}

editModal.onclick=e=>{if(e.target===editModal)closeEdit()};
viewModal.onclick=e=>{if(e.target===viewModal)closeView()};
dateModal.onclick=e=>{if(e.target===dateModal)closeDateModal()};
weeklyModal.onclick=e=>{if(e.target===weeklyModal)closeWeekly()};
render();
</script>
</body>
</html>
